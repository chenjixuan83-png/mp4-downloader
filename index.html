<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP4 Downloader</title>
<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    width:90%;
    max-width:420px;
    background:#1f2937;
    padding:20px;
    border-radius:18px;
}
input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-top:15px;
    margin-bottom:15px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}
video{
    width:100%;
    margin-top:20px;
    display:none;
}
</style>
</head>
<body>
<div class="box">
<h2>🎬 MP4 Downloader</h2>
<input
id="url"
placeholder="粘贴 MP4 视频链接">
<button onclick="download()">
预览 / 下载
</button>
<video
id="video"
controls>
</video>
</div>
<script>
function download(){
const url=document.getElementById("url").value;
if(url===""){
alert("请输入链接");
return;
}
const video=document.getElementById("video");
video.src=url;
video.style.display="block";
window.open(url,"_blank");
}
</script>
</body>
</html>
